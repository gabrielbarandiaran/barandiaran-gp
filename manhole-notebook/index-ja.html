<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マンホールノート — マンホールカードコレクションアプリ</title>
    <meta name="description" content="日本の美しいマンホールカードを収集・管理。コレクション管理、近くの配布場所検索、コレクター同士のつながりを実現。">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        .lang-switch {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 0.9rem;
        }

        .lang-switch a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .lang-switch a:hover {
            opacity: 1;
        }

        .logo {
            width: 140px;
            height: 140px;
            margin-bottom: 1.5rem;
            border-radius: 30px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 1.5rem;
        }

        .description {
            font-size: 1rem;
            opacity: 0.85;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .feature-text {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .app-badge {
            display: inline-block;
            transition: transform 0.2s;
        }

        .app-badge:hover {
            transform: scale(1.05);
        }

        .app-badge img {
            height: 50px;
        }

        .coming-soon {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .links {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .links a {
            color: white;
            text-decoration: none;
            margin: 0 0.75rem;
            transition: opacity 0.2s;
        }

        .links a:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="index.html">English</a>
    </div>

    <div class="container">
        <img src="assets/logo.png" alt="マンホールノート" class="logo">
        <h1>マンホールノート</h1>
        <p class="subtitle">マンホールカードコレクションアプリ</p>
        <p class="description">
            日本の美しいマンホールカードを収集・管理。<br>
            コレクション管理、近くの配布場所検索、コレクター同士のつながりを実現します。
        </p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📍</div>
                <div class="feature-text">近くのカードを検索</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📸</div>
                <div class="feature-text">スキャンでコレクト</div>
            </div>
            <div class="feature">
                <div class="feature-icon">👥</div>
                <div class="feature-text">フレンドとつながる</div>
            </div>
        </div>

        <div class="coming-soon">
            近日App Storeにて公開予定
        </div>

        <!--
        <a href="https://apps.apple.com/app/manhole-notebook/id000000000" class="app-badge">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="App Storeからダウンロード">
        </a>
        -->

        <div class="links">
            <a href="privacy-ja.html">プライバシーポリシー</a>
            <a href="terms-ja.html">利用規約</a>
            <a href="support-ja.html">サポート</a>
            <a href="mailto:gabriel@barandiaran.co">お問い合わせ</a>
        </div>
    </div>
</body>
</html>
