<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マンホールノート — マンホールカードコレクションアプリ</title>
    <meta name="description" content="日本全国のマンホールカードを収集・管理。1,200枚以上のカードデータ、配布場所検索、コレクション管理機能を搭載。">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf9f7;
            color: #2c2c2c;
            line-height: 1.6;
        }

        main {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            text-align: center;
        }

        .lang-switch {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 0.85rem;
        }

        .lang-switch a {
            color: #E86A2C;
            text-decoration: none;
        }

        .lang-switch a:hover {
            text-decoration: underline;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.25rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .tagline {
            font-size: 1rem;
            color: #E86A2C;
            font-weight: 500;
            margin-bottom: 1.25rem;
        }

        .description {
            font-size: 0.95rem;
            color: #666;
            max-width: 400px;
            margin-bottom: 1.5rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
        }

        .app-badge {
            display: inline-block;
            transition: transform 0.2s;
            margin-bottom: 1.5rem;
        }

        .app-badge:hover {
            transform: scale(1.03);
        }

        .app-badge img {
            height: 44px;
        }

        .links {
            font-size: 0.8rem;
        }

        .links a {
            color: #888;
            text-decoration: none;
            margin: 0 0.75rem;
        }

        .links a:hover {
            color: #E86A2C;
        }

        @media (max-height: 600px) {
            .logo { width: 80px; height: 80px; margin-bottom: 1rem; }
            h1 { font-size: 1.75rem; }
            .stats { gap: 2rem; margin-bottom: 1rem; }
            .stat-number { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <main>
        <div class="lang-switch">
            <a href="index-en.html">English</a>
        </div>

        <img src="assets/logo.png" alt="マンホールノート" class="logo">
        <h1>マンホールノート</h1>
        <p class="tagline">マンホールカードを、もっと楽しく</p>

        <p class="description">
            コレクション管理、配布場所の検索、新カード情報のお知らせなど、マンホールカード収集に必要な機能をすべて搭載。
        </p>

        <div class="stats">
            <div class="stat">
                <div class="stat-number">1,200+</div>
                <div class="stat-label">カード</div>
            </div>
            <div class="stat">
                <div class="stat-number">1,500+</div>
                <div class="stat-label">配布場所</div>
            </div>
            <div class="stat">
                <div class="stat-number">47</div>
                <div class="stat-label">都道府県</div>
            </div>
        </div>

        <a href="https://apps.apple.com/app/manhole-notebook/id000000000" class="app-badge">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="App Storeからダウンロード">
        </a>

        <div class="links">
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="terms.html">利用規約</a>
            <a href="support.html">サポート</a>
        </div>
    </main>
</body>
</html>
