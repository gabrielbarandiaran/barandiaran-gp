<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manhole Notebook — マンホールノート</title>
    <meta name="description" content="Collect and discover Japan's beautiful manhole covers. Track your collection, find nearby cards, and connect with fellow collectors.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        .logo {
            width: 140px;
            height: 140px;
            margin-bottom: 1.5rem;
            border-radius: 30px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 1.5rem;
        }

        .description {
            font-size: 1rem;
            opacity: 0.85;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .app-badge {
            display: inline-block;
            transition: transform 0.2s;
        }

        .app-badge:hover {
            transform: scale(1.05);
        }

        .app-badge img {
            height: 50px;
        }

        .links {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .links a {
            color: white;
            text-decoration: none;
            margin: 0 1rem;
            transition: opacity 0.2s;
        }

        .links a:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/logo.png" alt="Manhole Notebook" class="logo">
        <h1>Manhole Notebook</h1>
        <p class="subtitle">マンホールノート</p>
        <p class="description">
            Collect and discover Japan's beautiful manhole covers.<br>
            Track your collection, find nearby cards, and connect with fellow collectors.
        </p>

        <a href="https://apps.apple.com/app/manhole-notebook/id000000000" class="app-badge">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
        </a>

        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Service</a>
            <a href="mailto:support@manholenotebook.com">Contact</a>
        </div>
    </div>
</body>
</html>
